# 12-full-journey.yaml — Complete end-to-end user journey
# Maps to: e2e/full-user-journey.test.ts
# This is the comprehensive smoke test covering all major flows
appId: host.exp.Exponent
---
- launchApp:
    clearState: true
- assertVisible:
    id: "welcome-screen"
    timeout: 15000

# ============ LOGIN ============
- tapOn:
    id: "sign-in-link"
- tapOn:
    id: "email-input"
- inputText: ${TEST_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${TEST_PASSWORD}
- tapOn:
    id: "sign-in-button"
- assertVisible:
    id: "home-screen"
    timeout: 10000
- takeScreenshot: journey-01-home

# ============ MORNING CHECK-IN ============
- tapOn:
    id: "hero-card-button"
- assertVisible:
    id: "morning-checkin-screen"
    timeout: 5000
- tapOn: "System Design"
- tapOn:
    id: "daily-goal-input"
- inputText: "Full journey E2E test"
- tapOn:
    id: "morning-save-button"
- assertVisible:
    id: "home-screen"
    timeout: 5000
- takeScreenshot: journey-02-morning-done

# ============ EVENING CHECK-IN ============
- tapOn:
    id: "hero-card-button"
- assertVisible:
    id: "evening-checkin-screen"
    timeout: 5000
- tapOn:
    id: "goal-completion-partially"
- tapOn:
    id: "quick-win-input"
- inputText: "Completed full E2E journey"
- tapOn:
    id: "energy-level-4"
- tapOn:
    id: "tomorrow-carry-input"
- inputText: "Continue improving"
- tapOn:
    id: "evening-save-button"
- takeScreenshot: journey-03-evening-done

# ============ JOURNAL ============
- tapOn:
    id: "journal-tab"
- assertVisible:
    id: "journal-screen"
    timeout: 5000
- takeScreenshot: journey-04-journal

# ============ INSIGHTS ============
- tapOn:
    id: "insights-tab"
- assertVisible:
    id: "insights-screen"
    timeout: 5000
- takeScreenshot: journey-05-insights

# ============ PROFILE SETTINGS ============
- tapOn:
    id: "profile-tab"
- assertVisible:
    id: "profile-screen"
    timeout: 3000
- tapOn:
    id: "edit-profile-row"
- assertVisible:
    id: "edit-profile-screen"
    timeout: 3000
- takeScreenshot: journey-06-edit-profile
- tapOn:
    id: "back-button"

# ============ LOGOUT ============
- tapOn:
    id: "sign-out-button"
- assertVisible:
    id: "welcome-screen"
    timeout: 10000
- takeScreenshot: journey-07-logout
