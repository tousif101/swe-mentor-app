# 09-navigation-tabs.yaml — Verify tab navigation works
# Maps to: e2e/navigation-tabs.test.ts
# Prerequisite: App already running in simulator (loaded via xcrun simctl openurl)
appId: host.exp.Exponent
---
# Dismiss Expo Go dev menu if it appears (native sheet - use coordinate tap)
- runFlow:
    when:
      visible: "SDK version"
    commands:
      - tapOn:
          point: "50%,93%"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn:
                point: "50%,20%"
# Re-open app from Expo Go home screen if needed
- runFlow:
    when:
      visible: "Recently opened"
    commands:
      - tapOn: "SWE Mentor"
      - waitForAnimationToEnd
# Dismiss dev menu again after re-open
- runFlow:
    when:
      visible: "SDK version"
    commands:
      - tapOn:
          point: "50%,93%"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn:
                point: "50%,20%"
# Login
- extendedWaitUntil:
    visible:
      id: "welcome-screen"
    timeout: 30000
- tapOn:
    id: "sign-in-link"
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 5000
- tapOn:
    id: "email-input"
- inputText: ${TEST_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${TEST_PASSWORD}
- hideKeyboard
- tapOn:
    id: "sign-in-button"
# Dismiss iOS "Save Password?" dialog if it appears
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000
# Home tab (already here)
- takeScreenshot: nav-home-tab
# Journal tab
- tapOn:
    id: "journal-tab"
- extendedWaitUntil:
    visible:
      id: "journal-screen"
    timeout: 3000
- takeScreenshot: nav-journal-tab
# Insights tab
- tapOn:
    id: "insights-tab"
- extendedWaitUntil:
    visible:
      id: "insights-screen"
    timeout: 3000
- takeScreenshot: nav-insights-tab
# Profile tab
- tapOn:
    id: "profile-tab"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 3000
- takeScreenshot: nav-profile-tab
# Back to Home
- tapOn:
    id: "home-tab"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 3000
- takeScreenshot: nav-back-to-home
