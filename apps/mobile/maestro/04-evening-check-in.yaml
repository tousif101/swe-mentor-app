# 04-evening-check-in.yaml — Complete an evening check-in
# Maps to: e2e/evening-check-in.test.ts
# Prerequisite: Morning check-in should exist for the day
# Prerequisite: App already running in simulator (loaded via xcrun simctl openurl)
appId: host.exp.Exponent
---
# Dismiss Expo Go dev menu if it appears (native sheet - use coordinate tap)
- runFlow:
    when:
      visible: "SDK version"
    commands:
      - tapOn:
          point: "50%,93%"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn:
                point: "50%,20%"
# Re-open app from Expo Go home screen if needed
- runFlow:
    when:
      visible: "Recently opened"
    commands:
      - tapOn: "SWE Mentor"
      - waitForAnimationToEnd
# Dismiss dev menu again after re-open
- runFlow:
    when:
      visible: "SDK version"
    commands:
      - tapOn:
          point: "50%,93%"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn:
                point: "50%,20%"
# Login
- extendedWaitUntil:
    visible:
      id: "welcome-screen"
    timeout: 30000
- tapOn:
    id: "sign-in-link"
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 5000
- tapOn:
    id: "email-input"
- inputText: ${TEST_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${TEST_PASSWORD}
- hideKeyboard
- tapOn:
    id: "sign-in-button"
# Dismiss iOS "Save Password?" dialog if it appears
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000
# Start evening check-in
- tapOn:
    id: "hero-card-button"
- extendedWaitUntil:
    visible:
      id: "evening-checkin-screen"
    timeout: 5000
- takeScreenshot: evening-checkin-start
# Answer goal completion (use "partially" so energy level widget is visible)
- tapOn:
    id: "goal-completion-partially"
# Quick win
- tapOn:
    id: "quick-win-input"
- inputText: "Completed Maestro E2E test"
# Energy level (only visible when goal is not "yes")
- tapOn:
    id: "energy-level-4"
# Tomorrow carry
- tapOn:
    id: "tomorrow-carry-input"
- inputText: "Continue test coverage"
- hideKeyboard
# Save
- tapOn:
    id: "evening-save-button"
- takeScreenshot: evening-checkin-complete
