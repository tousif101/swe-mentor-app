# 08-profile-settings.yaml — Navigate profile settings screens
# Maps to: e2e/profile-settings.test.ts
# Prerequisite: App already running in simulator (loaded via xcrun simctl openurl)
appId: host.exp.Exponent
---
# Dismiss Expo Go dev menu if it appears (native sheet - use coordinate tap)
- runFlow:
    when:
      visible: "SDK version"
    commands:
      - tapOn:
          point: "50%,93%"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn:
                point: "50%,20%"
# Re-open app from Expo Go home screen if needed
- runFlow:
    when:
      visible: "Recently opened"
    commands:
      - tapOn: "SWE Mentor"
      - waitForAnimationToEnd
# Dismiss dev menu again after re-open
- runFlow:
    when:
      visible: "SDK version"
    commands:
      - tapOn:
          point: "50%,93%"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn:
                point: "50%,20%"
# Login
- extendedWaitUntil:
    visible:
      id: "welcome-screen"
    timeout: 30000
- tapOn:
    id: "sign-in-link"
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 5000
- tapOn:
    id: "email-input"
- inputText: ${TEST_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${TEST_PASSWORD}
- hideKeyboard
- tapOn:
    id: "sign-in-button"
# Dismiss iOS "Save Password?" dialog if it appears
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000
# Navigate to Profile tab
- tapOn:
    id: "profile-tab"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 5000
- takeScreenshot: profile-screen
# Edit Profile
- tapOn:
    id: "edit-profile-row"
- extendedWaitUntil:
    visible:
      id: "edit-profile-screen"
    timeout: 3000
- takeScreenshot: edit-profile-screen
- tapOn:
    id: "back-button"
# Career Goal
- tapOn:
    id: "career-goal-row"
- extendedWaitUntil:
    visible:
      id: "career-goal-screen"
    timeout: 3000
- takeScreenshot: career-goal-screen
- tapOn:
    id: "back-button"
# Reminder Settings
- tapOn:
    id: "reminder-settings-row"
- extendedWaitUntil:
    visible:
      id: "reminder-settings-screen"
    timeout: 3000
- takeScreenshot: reminder-settings-screen
- tapOn:
    id: "back-button"
