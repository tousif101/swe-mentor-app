# 07-journal-search-filter.yaml — Search and filter journal entries
# Maps to: e2e/journal-filter-search.test.ts
# Prerequisite: App already running in simulator (loaded via xcrun simctl openurl)
appId: host.exp.Exponent
---
# Dismiss Expo Go dev menu if it appears (native sheet - use coordinate tap)
- runFlow:
    when:
      visible: "SDK version"
    commands:
      - tapOn:
          point: "50%,93%"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn:
                point: "50%,20%"
# Re-open app from Expo Go home screen if needed
- runFlow:
    when:
      visible: "Recently opened"
    commands:
      - tapOn: "SWE Mentor"
      - waitForAnimationToEnd
# Dismiss dev menu again after re-open
- runFlow:
    when:
      visible: "SDK version"
    commands:
      - tapOn:
          point: "50%,93%"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn:
                point: "50%,20%"
# Login
- extendedWaitUntil:
    visible:
      id: "welcome-screen"
    timeout: 30000
- tapOn:
    id: "sign-in-link"
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 5000
- tapOn:
    id: "email-input"
- inputText: ${TEST_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${TEST_PASSWORD}
- hideKeyboard
- tapOn:
    id: "sign-in-button"
# Dismiss iOS "Save Password?" dialog if it appears
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000
# Navigate to Journal tab
- tapOn:
    id: "journal-tab"
- extendedWaitUntil:
    visible:
      id: "journal-screen"
    timeout: 5000
# Search
- tapOn:
    id: "journal-search-input"
- inputText: "test"
- takeScreenshot: journal-search-results
# Clear search
- clearInput:
    id: "journal-search-input"
# Filter by tag
- tapOn: "#system-design"
- takeScreenshot: journal-filtered-by-tag
# Clear filter
- tapOn: "All"
- takeScreenshot: journal-filter-cleared
