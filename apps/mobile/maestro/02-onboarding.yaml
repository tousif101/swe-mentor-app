# 02-onboarding.yaml — Signup and complete onboarding
# Maps to: e2e/authentication.test.ts (signup/onboarding portion)
# NOTE: This flow creates a new account each run. Pass TEST_NEW_EMAIL via -e flag.
# After the flow, clean up the test user via Supabase MCP:
#   DELETE FROM auth.users WHERE email = '<TEST_NEW_EMAIL>';
# Prerequisite: App already running in simulator (loaded via xcrun simctl openurl)
appId: host.exp.Exponent
---
# Dismiss Expo Go dev menu if it appears (native sheet - use coordinate tap)
- runFlow:
    when:
      visible: "SDK version"
    commands:
      - tapOn:
          point: "50%,93%"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn:
                point: "50%,20%"
# Re-open app from Expo Go home screen if needed
- runFlow:
    when:
      visible: "Recently opened"
    commands:
      - tapOn: "SWE Mentor"
      - waitForAnimationToEnd
# Dismiss dev menu again after re-open
- runFlow:
    when:
      visible: "SDK version"
    commands:
      - tapOn:
          point: "50%,93%"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn:
                point: "50%,20%"
- extendedWaitUntil:
    visible:
      id: "welcome-screen"
    timeout: 30000
- tapOn:
    id: "get-started-button"
- extendedWaitUntil:
    visible: "Create an account"
    timeout: 5000
- tapOn:
    id: "signup-email-input"
- inputText: ${TEST_NEW_EMAIL}
- tapOn:
    id: "signup-password-input"
- inputText: "MaestroTest123!"
- tapOn:
    id: "confirm-password-input"
- inputText: "MaestroTest123!"
- hideKeyboard
- tapOn:
    id: "create-account-button"
# Dismiss iOS "Save Password?" dialog if it appears
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"
- extendedWaitUntil:
    visible:
      text: "Set up your profile"
    timeout: 10000
- takeScreenshot: onboarding-profile-setup
# Fill profile
- tapOn:
    id: "onboarding-name-input"
- inputText: "Maestro Test"
- tapOn:
    id: "role-selector"
- extendedWaitUntil:
    visible: "Select your current role"
    timeout: 3000
- tapOn: "Software Engineer 1"
- tapOn:
    id: "profile-continue-button"
- extendedWaitUntil:
    visible:
      id: "reminder-setup-screen"
    timeout: 5000
- takeScreenshot: onboarding-reminders
- tapOn:
    id: "reminder-continue-button"
- extendedWaitUntil:
    visible:
      id: "ready-screen"
    timeout: 5000
- tapOn:
    id: "start-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000
- takeScreenshot: onboarding-complete
